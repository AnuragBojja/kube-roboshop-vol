apiVersion: v1
kind: Service
metadata: 
  name: rabbitmq
  namespace: roboshop
spec:
  selector:
    project: roboshop
    service: rabbitmq
    tier: database
  ports:
    - protocol: TCP
      port: 5672
      targetPort: 5672
---
apiVersion: v1
kind: Service
metadata: 
  name: rabbitmq-headless
  namespace: roboshop
spec:
  clusterIP: None
  selector:
    project: roboshop
    service: rabbitmq
    tier: database
  ports:
    - protocol: TCP
      port: 5672
      targetPort: 5672
---
apiVersion: apps/v1
kind: StatefulSet 
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    service: rabbitmq
    tier: database
spec:
  serviceName: rabbitmq-headless
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      service: rabbitmq
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        service: rabbitmq
        tier: database
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3
          imagePullPolicy: Always
          volumeMounts:
            - name: rabbitmq
              mountPath: /var/lib/rabbitmq
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: roboshop
            - name: RABBITMQ_DEFAULT_PASS
              value: roboshop123
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "roboshop-ebs-sc"
        resources:
          requests:
            storage: 1Gi
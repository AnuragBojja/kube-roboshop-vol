apiVersion: v1 
kind: ConfigMap
metadata:
  name: user 
  namespace: roboshop
  labels:
    project: roboshop
    service: user
    tier: backend
data:
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/users"
---
apiVersion: v1 
kind: Service 
metadata:
  name: user 
  namespace: roboshop 
  labels: 
    project: roboshop
    service: user
    tier: backend
spec:
  selector:
    project: roboshop
    service: user
    tier: backend
  ports:
    - protocol: TCP 
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: user 
  namespace: roboshop 
  labels: 
    project: roboshop
    service: user 
    tier: backend
spec: 
  replicas: 1
  selector:
    matchLabels: 
      project: roboshop
      service: user
      tier: backend
  template:
    metadata:
      labels:
        project: roboshop
        service: user 
        tier: backend
    spec: 
      containers: 
        - name: user 
          image: anuragbojja/user:v1
          imagePullPolicy: Always 
          envFrom:
            - configMapRef:
                name: user 
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            failureThreshold: 2
            periodSeconds: 10
          resources:
            requests:
                memory: "256Mi"
                cpu: "350m"
            limits:
              memory: "512Mi"
              cpu: "450m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user
  namespace: roboshop 
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

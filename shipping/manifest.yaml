apiVersion: v1 
kind: ConfigMap 
metadata:
  name: shipping
  namespace: roboshop 
  labels: 
    project: roboshop
    service: shipping
    tier: backend
data:
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"
---
apiVersion: v1 
kind: Service 
metadata:
  name: shipping
  namespace: roboshop 
  labels: 
    project: roboshop
    service: shipping
    tier: backend
spec:
  selector:
    project: roboshop
    service: shipping 
    tier: backend
  ports:
    - protocol: TCP 
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    service: shipping 
    tier: backend
spec: 
  replicas: 1
  selector: 
    matchLabels:
      project: roboshop
      service: shipping 
      tier: backend
  template:
    metadata:
      labels:
        project: roboshop
        service: shipping 
        tier: backend
    spec: 
      containers:
        - name: shipping
          image: anuragbojja/shipping:v1
          imagePullPolicy: Always 
          envFrom:
            - configMapRef:
                name: shipping
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            failureThreshold: 2
            periodSeconds: 10
          resources:
            requests:
                memory: "128Mi"
                cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "350m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shipping
  namespace: roboshop 
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shipping
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

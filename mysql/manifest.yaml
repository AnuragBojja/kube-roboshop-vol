apiVersion: v1 
kind: Service
metadata:
  name: mysql
  namespace: roboshop
spec:
  selector:
    project: roboshop
    service: mysql
    tier: database
  ports:
  - port: 3306
    protocol: TCP
    targetPort: 3306
---
apiVersion: v1 
kind: Service
metadata:
  name: mysql-headless
  namespace: roboshop
spec:
  clusterIP: None
  selector:
    project: roboshop
    service: mysql
    tier: database
  ports:
  - port: 3306
    protocol: TCP
    targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet 
metadata:
  name: mysql
  namespace: roboshop
spec:
  repicas: 1
  serviceName: mysql-headless
  selector:
    matchLabels:
      project: roboshop
      service: mysql
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        service: mysql
        tier: database
    spec:
      containers:
        - name: mysql
          image: anuragbojja/mysql:v1
          imagePullPolicy: Always
          volumeMounts:
            - name: mysql
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: mysql
    spec:
    accessModes: [ "ReadWriteOnce" ]
    storageClassName: "roboshop-ebs-sc"
    resources:
      requests:
        storage: 1Gi

        
apiVersion: v1 
kind: ConfigMap
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    service: payment 
    tier: backend
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"
---
apiVersion: v1
kind: Service 
metadata: 
  name: payment 
  namespace: roboshop
  labels:
    project: roboshop
    service: payment 
    tier: backend
spec:
  selector:
    project: roboshop
    service: payment 
    tier: backend
  ports:
    - protocol: TCP 
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment 
metadata: 
  name: payment 
  namespace: roboshop 
  labels:
    project: roboshop
    service: payment 
    tier: backend
spec: 
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      service: payment 
      tier: backend
  template:
    metadata:
      name: payment 
      namespace: roboshop 
      labels:
        project: roboshop
        service: payment 
        tier: backend
    spec:
      containers: 
        - name: payment 
          image: anuragbojja/payment:v1
          imagePullPolicy: Always 
          envFrom:
            - configMapRef:
                name: payment
          livenessProbe:
            httpGet:  
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:  
              path: /health
              port: 8080
            initialDelaySeconds: 30
            failureThreshold: 2
            periodSeconds: 10
          resources:
            requests:
                memory: "128Mi"
                cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "350m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shipping 
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shipping
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

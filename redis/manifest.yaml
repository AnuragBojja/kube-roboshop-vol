apiVersion: v1 
kind: Service
metadata:
  name: redis 
  namespace: roboshop
spec:
  selector:
    project: roboshop
    service: redis
    tier: database
  ports:
  - port: 6379
    protocol: TCP
    targetPort: 6379
---
apiVersion: v1 
kind: Service
metadata:
  name: redis-headless
  namespace: roboshop
spec:
  clusterIP: None
  selector:
    project: roboshop
    service: redis
    tier: database
  ports:
  - port: 6379
    protocol: TCP
    targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet 
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    service: redis
    tier: database
spec:
  replicas: 1
  serviceName: redis-headless
  selector: 
    matchLabels:
      project: roboshop
      service: redis
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        service: redis
        tier: database
    spec:
      containers:
        - name: redis
          image: redis:7
          imagePullPolicy: Always
          volumeMounts:
            - name: redis
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis
      spec: 
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "my-storage-class"
        resources:
          requests:
            storage: 1Gi
